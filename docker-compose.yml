version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: forestry-postgres
    environment:
      POSTGRES_USER: forestry_user
      POSTGRES_PASSWORD: forestry_password
      POSTGRES_DB: forestry_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forestry_user -d forestry_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: forestry-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@forestry.ae
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
